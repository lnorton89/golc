document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Brand Guidelines · v1.0<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ COVER ============ -->\n  <div style=\"max-width:1160px; margin:0 auto; padding:0 48px;\">\n    <div style=\"padding:80px 0 72px; border-bottom:1px solid var(--line2);\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#1B44D9; margin-bottom:40px;\">Identity System<\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:34px;\">\n        <svg sc-camel-view-box=\"0 0 100 100\" width=\"132\" height=\"132\" aria-label=\"GOLC mark\" style=\"flex-shrink:0;\">\n          <rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"22\" style=\"fill:var(--mark-tile)\"><\u002Frect>\n          <polygon points=\"50,25 18.5,84 25.5,84\" fill=\"#C0554A\"><\u002Fpolygon><polygon points=\"50,25 29.5,84 36.5,84\" fill=\"#CC8A47\"><\u002Fpolygon><polygon points=\"50,25 40.5,84 47.5,84\" fill=\"#B6A24C\"><\u002Fpolygon><polygon points=\"50,25 51.5,84 58.5,84\" fill=\"#4E9E68\"><\u002Fpolygon><polygon points=\"50,25 62.5,84 69.5,84\" fill=\"#1B44D9\"><\u002Fpolygon><polygon points=\"50,25 73.5,84 80.5,84\" fill=\"#6A50A8\"><\u002Fpolygon>\n          <rect x=\"40\" y=\"18\" width=\"20\" height=\"7\" rx=\"3\" style=\"fill:var(--mark-bar)\"><\u002Frect>\n        <\u002Fsvg>\n        <div>\n          <div style=\"font-size:128px; font-weight:800; letter-spacing:-0.035em; line-height:0.84; color:var(--ink);\">GOLC<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:0.24em; text-transform:uppercase; color:var(--muted); margin-top:14px; padding-left:3px;\">Go Lighting Control<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:baseline; gap:18px; margin-top:52px; padding-top:26px; border-top:1px solid var(--line);\">\n        <h1 style=\"font-size:38px; font-weight:600; letter-spacing:-0.02em; margin:0; color:var(--text);\">Brand Guidelines<\u002Fh1>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.12em; color:var(--faint);\">V1.0<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"max-width:560px; margin:22px 0 0; font-size:17px; line-height:1.6; color:var(--text);\">The complete visual and verbal identity for GOLC — open-source, deterministic lighting control for the people who run the room, not the rack.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 00 CONTENTS ============ -->\n  <div style=\"max-width:1160px; margin:0 auto; padding:0 48px;\">\n    <div style=\"padding:56px 0 72px; display:grid; grid-template-columns:200px 1fr; gap:56px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Contents<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:2px 64px; font-size:16px;\">\n        <a href=\"#s-logo\" style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--line); color:var(--ink);\"><span style=\"font-family:'JetBrains Mono',monospace; color:#1B44D9;\">01<\u002Fspan> Logo suite<\u002Fa>\n        <a href=\"#s-usage\" style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--line); color:var(--ink);\"><span style=\"font-family:'JetBrains Mono',monospace; color:#1B44D9;\">02<\u002Fspan> Logo usage &amp; clear space<\u002Fa>\n        <a href=\"#s-color\" style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--line); color:var(--ink);\"><span style=\"font-family:'JetBrains Mono',monospace; color:#1B44D9;\">03<\u002Fspan> Color palette<\u002Fa>\n        <a href=\"#s-type\" style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--line); color:var(--ink);\"><span style=\"font-family:'JetBrains Mono',monospace; color:#1B44D9;\">04<\u002Fspan> A50A8\"><\u002Fpolygon><rect x=\"48\" y=\"22\" width=\"24\" height=\"8\" rx=\"3.5\" fill=\"#EDE9E1\"><\u002Frect><\u002Fsvg><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-top:8px;\">28<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 07 UI SYSTEM & STATES ============ -->\n  <div id=\"s-states\" style=\"max-width:1160px; margin:0 auto; padding:0 48px;\">\n    <div style=\"display:flex; align-items:baseline; gap:20px; padding-top:64px; margin-top:56px; border-top:2px solid var(--ink);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#1B44D9; letter-spacing:0.1em;\">07<\u002Fspan>\n      <h2 style=\"font-size:34px; font-weight:700; letter-spacing:-0.02em; margin:0;\">UI system &amp; states<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:44px 0 0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Operating states<\u002Fdiv>\n      <div>\n        <p style=\"font-size:15px; line-height:1.65; color:var(--text); margin:0 0 24px; max-width:660px;\">Every control surface routes through one typed command model, so state reads the same in the app, the API, and scripts. Six states carry meaning through color; each pairs with a text label — color is never the only signal.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\">\n          <div style=\"border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:20px 22px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:12px;\"><span style=\"width:12px; height:12px; border-radius:50%; background:#1B44D9;\"><\u002Fspan><span style=\"font-size:16px; font-weight:600; color:var(--ink);\">Live<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">Art-Net output is active and a look is on stage.<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; color:var(--muted); margin-top:14px;\">STATE · LIVE<\u002Fdiv>\n        <\u002Fdiv>\n          <div style=\"border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:20px 22px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:12px;\"><span style=\"width:12px; height:12px; border-radius:50%; background:#5AC26A;\"><\u002Fspan><span style=\"font-size:16px; font-weight:600; color:var(--ink);\">Frame lock<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">Playback holds a steady frame rate, isolated from the UI.<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; color:var(--muted); margin-top:14px;\">40 FPS · LOCKED<\u002Fdiv>\n        <\u002Fdiv>\n          <div style=\"border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:20px 22px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:12px;\"><span style=\"width:12px; height:12px; border-radius:50%; background:#C8A24B;\"><\u002Fspan><span style=\"font-size:16px; font-weight:600; color:var(--ink);\">Armed<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">An automation lease is armed, or a look has unsaved edits.<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; color:var(--muted); margin-top:14px;\">LEASE · ARMED<\u002Fdiv>\n        <\u002Fdiv>\n          <div style=\"border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:20px 22px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:12px;\"><span style=\"width:12px; height:12px; border-radius:50%; background:#E23A2E;\"><\u002Fspan><span style=\"font-size:16px; font-weight:600; color:var(--ink);\">Revoked<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">Revoke Automation has blocked AI and scripts; the look is frozen.<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; color:var(--muted); margin-top:14px;\">AUTOMATION · REVOKED<\u002Fdiv>\n        <\u002Fdiv>\n          <div style=\"border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:20px 22px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:12px;\"><span style=\"width:12px; height:12px; border-radius:50%; border:2px solid var(--ink); background:transparent;\"><\u002Fspan><span style=\"font-size:16px; font-weight:600; color:var(--ink);\">Blackout<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">A separate, immediate intensity kill — independent of playback.<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; color:var(--muted); margin-top:14px;\">INTENSITY · 0<\u002Fdiv>\n        <\u002Fdiv>\n          <div style=\"border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:20px 22px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:12px;\"><span style=\"width:12px; height:12px; border-radius:50%; background:#8A887F;\"><\u002Fspan><span style=\"font-size:16px; font-weight:600; color:var(--ink);\">Offline<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">A provider or integration is unreachable; local work continues.<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; color:var(--muted); margin-top:14px;\">PROVIDER · OFFLINE<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:44px 0 4px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Operator authority<\u002Fdiv>\n      <div>\n        <p style=\"font-size:15px; line-height:1.65; color:var(--text); margin:0 0 22px; max-width:660px;\">Two controls always belong to the person in the room. They are visually the heaviest elements in the interface and never hidden behind a menu.<\u002Fp>\n        <div style=\"display:flex; gap:16px; flex-wrap:wrap;\">\n          <button style=\"height:54px; padding:0 30px; border-radius:10px; border:none; background:#17181C; color:#fff; font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.16em; text-transform:uppercase; cursor:pointer; display:inline-flex; align-items:center; gap:12px;\"><span style=\"width:12px; height:12px; border-radius:50%; border:2px solid #fff;\"><\u002Fspan>Blackout<\u002Fbutton>\n          <button style=\"height:54px; padding:0 30px; border-radius:10px; border:1.5px solid #E23A2E; background:transparent; color:#E23A2E; font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.16em; text-transform:uppercase; cursor:pointer;\">Revoke Automation<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 08 PRODUCT UI ============ -->\n  <div id=\"s-ui\" style=\"max-width:1160px; margin:0 auto; padding:0 48px;\">\n    <div style=\"display:flex; align-items:baseline; gap:20px; padding-top:64px; margin-top:56px; border-top:2px solid var(--ink);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#1B44D9; letter-spacing:0.1em;\">08<\u002Fspan>\n      <h2 style=\"font-size:34px; font-weight:700; letter-spacing:-0.02em; margin:0;\">Product UI<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:44px 0 0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Interface<\u002Fdiv>\n      <div>\n        <p style=\"font-size:15px; line-height:1.65; color:var(--text); margin:0; max-width:660px;\">A Wails desktop app for Windows first. The interface is dark by default — a control room, not a document — with Signal Blue reserved for live and active state. These are representative views of the planned v1 workflow: author once, deploy repeatedly.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- App UI mockup -->\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:36px 0 0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Live output<br>&amp; playback<\u002Fdiv>\n      <div style=\"border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:0 24px 60px rgba(23,24,28,.16);\">\n        <div style=\"background:#0F1013; padding:0;\">\n          <div style=\"height:42px; background:#191A1E; display:flex; align-items:center; padding:0 16px; gap:8px; border-bottom:1px solid #26272c;\">\n            <div style=\"width:12px; height:12px; border-radius:50%; background:#E25C4E;\"><\u002Fdiv>\n            <div style=\"width:12px; height:12px; border-radius:50%; background:#E3B341;\"><\u002Fdiv>\n            <div style=\"width:12px; height:12px; border-radius:50%; background:#5AC26A;\"><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:8px; margin-left:16px;\">\n              <svg sc-camel-view-box=\"0 0 100 100\" width=\"18\" height=\"18\"><rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"22\" fill=\"#F4F1EB\"><\u002Frect><polygon points=\"50,25 18 :#F4F1EB; line-height:1;\">Lighting control<br>that behaves.<\u002Fdiv>\n            <div style=\"font-size:20px; color:#B8B6AD; margin-top:22px; max-width:620px; line-height:1.5;\">Deterministic Art-Net playback, scriptable in TypeScript. Free and open source.<\u002Fdiv>\n            <div style=\"display:flex; gap:12px; margin-top:26px; font-family:'JetBrains Mono',monospace; font-size:14px;\">\n              <span style=\"border:1px solid #3a3b40; color:#9A988F; padding:7px 14px; border-radius:100px;\">Go<\u002Fspan>\n              <span style=\"border:1px solid #3a3b40; color:#9A988F; padding:7px 14px; border-radius:100px;\">Art-Net<\u002Fspan>\n              <span style=\"border:1px solid #3a3b40; color:#9A988F; padding:7px 14px; border-radius:100px;\">MIT<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- README banner -->\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:36px 0 0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">README header<br>1280 × 300<\u002Fdiv>\n      <div style=\"border:1px solid var(--line); border-radius:14px; overflow:hidden;\">\n        <div style=\"aspect-ratio:1280/300; background:#E4E0D8; display:flex; align-items:center; gap:28px; padding:0 56px;\">\n          <svg sc-camel-view-box=\"0 0 100 100\" width=\"84\" height=\"84\"><rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"22\" fill=\"#17181C\"><\u002Frect><polygon points=\"50,25 18.5,84 25.5,84\" fill=\"#C0554A\"><\u002Fpolygon><polygon points=\"50,25 29.5,84 36.5,84\" fill=\"#CC8A47\"><\u002Fpolygon><polygon points=\"50,25 40.5,84 47.5,84\" fill=\"#B6A24C\"><\u002Fpolygon><polygon points=\"50,25 51.5,84 58.5,84\" fill=\"#4E9E68\"><\u002Fpolygon><polygon points=\"50,25 62.5,84 69.5,84\" fill=\"#1B44D9\"><\u002Fpolygon><polygon points=\"50,25 73.5,84 80.5,84\" fill=\"#6A50A8\"><\u002Fpolygon><rect x=\"40\" y=\"18\" width=\"20\" height=\"7\" rx=\"3\" fill=\"#EDE9E1\"><\u002Frect><\u002Fsvg>\n          <div style=\"flex:1;\">\n            <div style=\"font-size:56px; font-weight:800; letter-spacing:-0.035em; color:#17181C; line-height:0.95;\">GOLC<\u002Fdiv>\n            <div style=\"font-size:17px; color:#4A4941; margin-top:8px;\">Go Lighting Control — deterministic, scriptable, open.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:1px; height:120px; background:#C9C3B7;\"><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#6C6A63; line-height:1.9;\">$ golc run show.ts<br><span style=\"color:#1B44D9;\">→ art-net · 44 universes<\u002Fspan><br><span style=\"color:#1B44D9;\">→ 40 fps · locked<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- swag -->\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:36px 0 0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Stickers<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px;\">\n        <div style=\"aspect-ratio:1; border-radius:20px; background:#17181C; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(23,24,28,.14);\">\n          <svg sc-camel-view-box=\"0 0 100 100\" width=\"72\" height=\"72\"><rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"22\" fill=\"#F4F1EB\"><\u002Frect><polygon points=\"50,25 18.5,84 25.5,84\" fill=\"#C0554A\"><\u002Fpolygon><polygon points=\"50,25 29.5,84 36.5,84\" fill=\"#CC8A47\"><\u002Fpolygon><polygon points=\"50,25 40.5,84 47.5,84\" fill=\"#B6A24C\"><\u002Fpolygon><polygon points=\"50,25 51.5,84 58.5,84\" fill=\"#4E9E68\"><\u002Fpolygon><polygon points=\"50,25 62.5,84 69.5,84\" fill=\"#1B44D9\"><\u002Fpolygon><polygon points=\"50,25 73.5,84 80.5,84\" fill=\"#6A50A8\"><\u002Fpolygon><rect x=\"40\" y=\"18\" width=\"20\" height=\"7\" rx=\"3\" fill=\"#17181C\"><\u002Frect><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"aspect-ratio:1; border-radius:20px; background:#1B44D9; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(27,68,217,.24);\">\n          <div style=\"font-size:40px; font-weight:800; letter-spacing:-0.03em; color:#fff;\">GOLC<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"aspect-ratio:1; border-radius:20px; background:#E4E0D8; border:1px solid #D2CCC0; display:flex; align-items:center; justify-content:center; padding:18px; text-align:center;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; line-height:1.5; color:#17181C;\">run the<br>room,<br><span style=\"color:#1B44D9;\">not the rack<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"aspect-ratio:1; border-radius:20px; background:#17181C; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#5AC26A;\">● 40 FPS<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#9A988F;\">LOCKED<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 10 LEXICON ============ -->\n  <div id=\"s-lexicon\" style=\"max-width:1160px; margin:0 auto; padding:0 48px;\">\n    <div style=\"display:flex; align-items:baseline; gap:20px; padding-top:64px; margin-top:56px; border-top:2px solid var(--ink);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#1B44D9; letter-spacing:0.1em;\">10<\u002Fspan>\n      <h2 style=\"font-size:34px; font-weight:700; letter-spacing:-0.02em; margin:0;\">Lexicon<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:44px 0 0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Terminology<\u002Fdiv>\n      <div>\n        <p style=\"font-size:15px; line-height:1.65; color:var(--text); margin:0 0 20px; max-width:660px;\">Use these terms consistently across UI, docs, and marketing. They are precise on purpose — the product treats each as a distinct concept.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:0 48px;\">\n          <div>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Patch<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">Mapping logical fixtures to Art-Net addresses and modes.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Fixture pool<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">A reusable logical group a show targets, independent of concrete count or address.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Look / Scene<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">A stored state of attributes; tempo-aware scenes loop in bars.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Chase<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">An ordered sequence of steps advanced on tempo.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Transition preset<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">A reusable blend applied between looks.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Impact preview<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">A deterministic plan shown before a pool resize or fixture substitution.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Soft takeover<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">MIDI control that engages only once a fader matches the live value.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Art-Net<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">The Ethernet DMX protocol GOLC outputs (Art-Net 4).<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Universe<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">512 DMX channels carried over Art-Net.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Deterministic playback<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">Output timing isolated from the UI, scripts, and providers.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Lease<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">A time-bounded, armed grant that lets an AI operate the app.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Revoke Automation<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">The control that blocks AI and scripts and freezes the current look.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Blackout<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">A separate, immediate intensity kill.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px 0; border-bottom:1px solid var(--line);\"><div style=\"font-size:16px; font-weight:600; color:var(--ink); margin-bottom:5px;\">Command model<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; color:var(--text2);\">One typed command set shared by the UI, API, scripts, and AI.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 11 MOTION & INTERACTION ============ -->\n  <div id=\"s-motion\" style=\"max-width:1160px; margin:0 auto; padding:0 48px;\">\n    <div style=\"display:flex; align-items:baseline; gap:20px; padding-top:64px; margin-top:56px; border-top:2px solid var(--ink);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#1B44D9; letter-spacing:0.1em;\">11<\u002Fspan>\n      <h2 style=\"font-size:34px; font-weight:700; letter-spacing:-0.02em; margin:0;\">Motion &amp; interaction<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:44px 0 0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Principles<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--line); border:1px solid var(--line);\">\n        <div style=\"background:var(--panel); padding:26px 24px; border:1px solid var(--line);\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#1B44D9; margin-bottom:12px;\">01<\u002Fdiv>\n          <div style=\"font-size:18px; font-weight:600; color:var(--ink); margin-bottom:8px;\">Output before motion<\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.6; color:var(--text2);\">Animation is cosmetic and always yields — a transition never delays or corrupts a frame.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--panel); padding:26px 24px; border:1px solid var(--line);\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#1B44D9; margin-bottom:12px;\">02<\u002Fdiv>\n          <div style=\"font-size:18px; font-weight:600; color:var(--ink); margin-bottom:8px;\">Motion is a state cue<\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.6; color:var(--text2);\">Movement confirms arm, revoke, blackout, and commit. It carries meaning, never decoration.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--panel); padding:26px 24px; border:1px solid var(--line);\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#1B44D9; margin-bottom:12px;\">03<\u002Fdiv>\n          <div style=\"font-size:18px; font-weight:600; color:var(--ink); margin-bottom:8px;\">On tempo<\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.6; color:var(--text2);\">Show motion follows BPM and bars. Interface motion follows short, predictable eases.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--panel); padding:26px 24px; border:1px solid var(--line);\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#1B44D9; margin-bottom:12px;\">04<\u002Fdiv>\n          <div style=\"font-size:18px; font-weight:600; color:var(--ink); margin-bottom:8px;\">Restraint<\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.6; color:var(--text2);\">120–200ms ease-outs. Nothing bounces, spins, or lingers. The room should feel steady.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:44px 0 4px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Timing tokens<\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text); border:1px solid var(--line); border-radius:100px; padding:9px 15px;\">snap · 0ms<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text); border:1px solid var(--line); border-radius:100px; padding:9px 15px;\">tap · 120ms ease-out<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text); border:1px solid var(--line); border-radius:100px; padding:9px 15px;\">settle · 200ms ease<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text); border:1px solid var(--line); border-radius:100px; padding:9px 15px;\">frame · 25ms (40 fps)<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 12 POSITIONING & VOICE ============ -->\n  <div id=\"s-voice\" style=\"max-width:1160px; margin:0 auto; padding:0 48px;\">\n    <div style=\"display:flex; align-items:baseline; gap:20px; padding-top:64px; margin-top:56px; border-top:2px solid var(--ink);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#1B44D9; letter-spacing:0.1em;\">12<\u002Fspan>\n      <h2 style=\"font-size:34px; font-weight:700; letter-spacing:-0.02em; margin:0;\">Positioning &amp; voice<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:44px 0 0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Positioning<\u002Fdiv>\n      <div>\n        <p style=\"font-size:26px; line-height:1.42; font-weight:500; letter-spacing:-0.01em; margin:0 0 24px; color:var(--ink); max-width:760px; text-wrap:pretty;\">GOLC is desktop lighting control that behaves like an instrument: deterministic Art-Net playback, scriptable in TypeScript, open by default — precise enough for professionals, calm enough for a volunteer on a Sunday.<\u002Fp>\n        <p style=\"font-size:16px; line-height:1.65; color:var(--text); margin:0; max-width:680px;\">Built in Go for clubs, churches, schools and community venues, GOLC treats reliability as the feature. Cues fire the same way every time. The state is inspectable. Nothing hides behind a dongle. The brand should feel like a well-made piece of stage hardware — quiet, exact, and trustworthy under pressure.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:52px 0 0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Voice principles<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:#D2CCC0; border:1px solid var(--line);\">\n        <div style=\"background:var(--panel); padding:28px 26px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#1B44D9; margin-bottom:12px;\">01<\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">Plain over clever<\u002Fdiv>\n          <div style=\"font-size:15px; line-height:1.6; color:var(--text2);\">Say the true thing simply. An operator mid-show has no time to decode marketing.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--panel); padding:28px 26px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#1B44D9; margin-bottom:12px;\">02<\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">Precise, never vague<\u002Fdiv>\n          <div style=\"font-size:15px; line-height:1.6; color:var(--text2);\">Name the protocol, the channel, the frame. Specificity is how we earn trust.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--panel); padding:28px 26px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#1B44D9; margin-bottom:12px;\">03<\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">Reassuring under pressure<\u002Fdiv>\n          <div style=\"font-size:15px; line-height:1.6; color:var(--text2);\">Calm tone, no exclamation. The tool that stays steady when the room is loud.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--panel); padding:28px 26px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#1B44D9; margin-bottom:12px;\">04<\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">Open and documented<\u002Fdiv>\n          <div style=\"font-size:15px; line-height:1.6; color:var(--text2);\">Nothing hidden. Every behavior is written down and every claim is verifiable.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:52px 0 0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Say / don't say<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:28px;\">\n        <div>\n          <div style=\"font-size:13px; font-family:'JetBrains Mono',monospace; color:#1B44D9; margin-bottom:14px;\">✓ SAY<\u002Fdiv>\n          <div style=\"font-size:15px; line-height:1.9; color:var(--text);\">“Deterministic Art-Net playback.”<br>“Cues fire the same way every time.”<br>“Scriptable in TypeScript.”<br>“Free and open source.”<br>“Runs on your machine.”<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px; font-family:'JetBrains Mono',monospace; color:#A3200F; margin-bottom:14px;\">✕ AVOID<\u002Fdiv>\n          <div style=\"font-size:15px; line-height:1.9; color:var(--faint);\">“Next-gen AI lighting revolution.”<br>“Unleash your creativity!”<br>“Enterprise-grade synergy.”<br>“Magical, effortless, seamless.”<br>Exclamation-heavy hype.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:200px 1fr; gap:56px; padding:52px 0 20px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);\">Taglines<\u002Fdiv>\n      <div>\n        <div style=\"font-size:28px; font-weight:600; letter-spacing:-0.015em; line-height:1.3; margin-bottom:18px;\">Lighting control that behaves.<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:10px; font-family:'JetBrains Mono',monospace; font-size:13px;\">\n          <span style=\"border:1px solid var(--line2); padding:8px 14px; border-radius:100px; color:var(--text);\">Deterministic lighting control.<\u002Fspan>\n          <span style=\"border:1px solid var(--line2); padding:8px 14px; border-radius:100px; color:var(--text);\">Run the room, not the rack.<\u002Fspan>\n          <span style=\"border:1px solid var(--line2); padding:8px 14px; border-radius:100px; color:var(--text);\">Open. Scriptable. Repeatable.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ FOOTER ============ -->\n  <div style=\"max-width:1160px; margin:64px auto 0; padding:0 48px;\">\n    <div style=\"border-top:2px solid var(--ink); padding:28px 0; display:flex; justify-content:space-between; align-items:center;\">\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <svg sc-camel-view-box=\"0 0 100 100\" width=\"28\" height=\"28\"><rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"22\" style=\"fill:var(--mark-tile)\"><\u002Frect><polygon points=\"50,25 18.5,84 25.5,84\" fill=\"#C0554A\"><\u002Fpolygon><polygon points=\"50,25 29.5,84 36.5,84\" fill=\"#CC8A47\"><\u002Fpolygon><polygon points=\"50,25 40.5,84 47.5,84\" fill=\"#B6A24C\"><\u002Fpolygon><polygon points=\"50,25 51.5,84 58.5,84\" fill=\"#4E9E68\"><\u002Fpolygon><polygon points=\"50,25 62.5,84 69.5,84\" fill=\"#1B44D9\"><\u002Fpolygon><polygon points=\"50,25 73.5,84 80.5,84\" fill=\"#6A50A8\"><\u002Fpolygon><rect x=\"40\" y=\"18\" width=\"20\" height=\"7\" rx=\"3\" style=\"fill:var(--mark-bar)\"><\u002Frect><\u002Fsvg>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); letter-spacing:0.1em;\">GOLC BRAND GUIDELINES · v1.0<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted);\">github.com/lnorton89/golc<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
