archive_sha256 = "fe4789e92b1f33358680864bbe8704289e7bb5fc207d80623c308935bd696d49"

[toolchain.go.platforms."darwin-amd64"]
archive_url = "https://go.dev/dl/go1.26.5.darwin-amd64.tar.gz"
