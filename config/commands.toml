# GOLC commands concern: the supported repository command surface.
#
# This file alone owns the contributor entrypoint and delegated CLI
# locations (single-authority rule). The pinned Go version is referenced
# from the toolchain concern — never repeated here (D-05: a concern may
# refer to another authority through a typed "ref:" value, but it may not
# duplicate it).

schema_version = 1

[commands]
entrypoint = "golc.ps1"
cli_binary = ".tools/installs/golc_project/bin/golc-project.exe"
go_version = "ref:toolchain.go.version"

# Windows PR CI policy (D-03/D-10/D-16): the exact ordered root-command
# graph a Windows pull-request job may invoke, plus its network and
# mutation policy. .github/workflows/check.yml and
# tests/acceptance/command-parity.ps1 both parse this single authoritative
# declaration (through the self-registered "check --command-parity" route)
# rather than each maintaining an independent duplicate inventory. Values
# stay flat, pattern-matched, comma-separated strings — not a TOML array or
# table array — because the strict single-authority concern decoder does
# not decode array-valued keys (the same precedent config/toolchain.toml's
# per-tool official_host/official_path_prefix keys already establish).
[commands.pr]
# Exact ordered "route [--flag ...]" invocations: the same contributor
# graph (generate --check, check --offline, build, test) plus bootstrap
# (tool acquisition) and the foundation package build.
steps = "bootstrap,generate --check,check --offline,build,test,package --foundation"
# Only "bootstrap" may open a network connection (D-02); every other step
# runs with network denied, matching internal/delivery's offline core
# graph exactly.
network_steps = "bootstrap"
# No PR step may mutate anything remote (D-16): pull-request CI is
# read-only end to end. Mutating Linear synchronization only ever runs
# through an explicit, separate, protected/manual command context.
mutation_steps = "none"

# Linear SDK workspace scopes (Plan 01-13): the isolated tools/linear-sync
# Node workspace registers exactly five scopes -- "linear-sdk" (build,
# `build --scope linear-sdk`), "linear-sdk-operations" (quick test,
# `test --quick --scope linear-sdk-operations`, consumed starting with
# Plan 01-25's SDK contract tests), "linear-transport-pagination" (quick
# test, `test --quick --scope linear-transport-pagination`, consumed
# starting with Plan 01-14's exhaustive Relay connection pagination --
# T-01-39: every page is consumed and cursor anomalies never reach an
# identity/create/preview decision), "linear-transport-errors" (quick
# test, `test --quick --scope linear-transport-errors`, consumed starting
# with Plan 01-26's HTTP-200 data-plus-errors and rate-limit normalization
# -- T-01-40: a data-plus-errors read and any rate-limited/partial
# mutation both block/stop-write, and every diagnostic exposes only
# allowlisted path/code/operation/request/endpoint/complexity/reset
# metadata), and "linear-transport-node" (quick test,
# `test --quick --scope linear-transport-node`, consumed starting with
# Plan 01-27's redaction/uncertain-write contract -- T-01-40/T-01-41: a
# create/update mutation observing a partial GraphQL error, timeout, or
# any other SDK failure -- including its own mandatory readback -- returns
# a typed unknown outcome immediately via redact.ts's safeError, with zero
# automatic write retry, and redact.ts's scanCanary proves no fake
# credential/header byte ever reaches an emitted diagnostic). All five are
# self-registered through the same Plan 17 MustDeclareRoute/
# MustDeclareScope contract internal/command/router.go already establishes
# (internal/command/linear_sync.go calls
# MustDeclareNodeBuildScope/MustDeclareNodeScope), not as machine-readable
# keys here: config/toolchain.toml's strict single-authority "commands"
# concern spec (internal/projectconfig/model.go DefaultSpec) owns exactly
# the six keys above, so this scope set stays documented here in prose
# rather than duplicating a second, competing declaration source. This
# comment is that documentation, matching commands.toml's existing
# authority-by-prose precedent for D-16 mutation policy above.

# Real process transport and remote routes (Plan 01-15): "linear preview
# --remote --out <path>" and "linear drift --remote --read-only" capture a
# targeted snapshot (every already-linked entity, read back by immutable
# UUID) through internal/trace/transport.ProcessClient over the exact
# compiled adapter entrypoint tools/linear-sync/dist/src/cli.js, launched
# with the pinned project-local Node executable only -- never a host PATH
# lookup. "linear apply {plan-file} --plan-id <id>" (Plan 01-24's route,
# unchanged) resolves its RemoteClient through the same process transport
# and commits every achieved result back into .planning/linear-map.json,
# which is what makes a later preview/apply against the same repository
# observe it (replay is a safe no-op). None of these three routes belongs
# to the offline core graph (internal/delivery's coreSteps): a missing or
# unbuilt adapter fails only the explicit remote command that needed it,
# never generate/check/build/test (T-01-46; tests/acceptance/
# linear-transport.ps1 -Mode offline proves this). LINEAR_API_KEY (D-19/
# D-20) and LINEAR_TEAM_ID are read only inside these three routes, never
# by any offline command. package --foundation additionally includes the
# compiled adapter's dist/src/*.js output plus its package.json/
# package-lock.json when they already exist on disk (developer-tooling
# review/build material, never claimed as part of the GOLC application
# runtime); a checkout that never ran `bootstrap --include linear-sync`
# simply produces a foundation bundle without those optional entries.
