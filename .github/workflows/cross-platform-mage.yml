# Contributor-tool portability observation only. Linux and macOS results do
# not qualify the GOLC application for either platform.
#
# Go and Mage are both installed from the checksum-pinned archives
# committed in config/toolchain.toml (scripts/ci/install-pinned-mage.
# {sh,ps1}), not via an ambient `go install`: that approach is absent an
# ambient Go entirely on some hosted macOS runners, and even where it
# succeeds its GOPATH/bin output is not on PATH for later steps by
# default. Go is provisioned alongside Mage (not just Mage) because Mage
# JIT-compiles the magefile package at every invocation and therefore
# always needs a Go compiler on PATH, regardless of how the mage binary
# itself was obtained.
name: cross-platform Mage observation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  observe:
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    env:
      GOLC_BOOTSTRAP_INCLUDE_LINEAR_SYNC: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Mage (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash scripts/ci/install-pinned-mage.sh

      - name: Install pinned Mage (Windows)
        if: runner.os == 'Windows'
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ci/install-pinned-mage.ps1

      - name: Bootstrap verified project toolchains
        run: mage Bootstrap

      - name: Check generated files
        run: mage GenerateCheck

      - name: Check offline graph
        run: mage CheckOffline

      - name: Build
        run: mage Build

      - name: Test
        run: mage Test

      - name: Package foundation
        run: mage PackageFoundation
