# GOLC Windows PR validation workflow (CONTEXT D-03/D-10/D-16).
#
# This job is deliberately least-privilege and read-only end to end:
#   - The only trigger is an untrusted pull_request event. No manual
#     dispatch, scheduled, or push-triggered path exists, so this workflow
#     can never gain mutation authority through a second entry point.
#   - Every step below invokes the exact same root command graph a
#     contributor runs locally, in the same order, through golc.ps1 only.
#     config/commands.toml's commands.pr section is this graph's single
#     authoritative source; tests/acceptance/command-parity.ps1 proves this
#     file stays in lockstep with it through the self-registered
#     "check --command-parity" route.
#   - No repository secret is read, exported, or referenced anywhere in
#     this file, and no Linear synchronization or reconciliation command
#     appears here. Mutating remote synchronization only ever runs through
#     an explicit, separate, protected/manual command context — never from
#     an untrusted pull-request job.
name: check

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: bootstrap
        run: powershell -NoProfile -File .\golc.ps1 bootstrap

      - name: generate --check
        run: powershell -NoProfile -File .\golc.ps1 generate --check

      - name: check --offline
        run: powershell -NoProfile -File .\golc.ps1 check --offline

      - name: build
        run: powershell -NoProfile -File .\golc.ps1 build

      - name: test
        run: powershell -NoProfile -File .\golc.ps1 test

      - name: package --foundation
        run: powershell -NoProfile -File .\golc.ps1 package --foundation
