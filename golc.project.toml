# GOLC root configuration index (CONTEXT D-05).
#
# This file owns only schema and index metadata. It points at logically
# separated concern files and never holds configuration values itself;
# each indexed concern file alone owns its values. Paths are strictly
# repository-relative and are containment-checked before any read.
#
# The index must discover exactly the concerns registered in the strict
# single-authority model (internal/projectconfig/model.go); hiding or
# inventing a concern fails validation with GOLC_CONFIG_INDEX_MISMATCH.

schema_version = 2

[[concerns]]
id = "toolchain"
path = "config/toolchain.toml"

[[concerns]]
id = "commands"
path = "config/commands.toml"

[[concerns]]
id = "generation"
path = "config/generation.toml"

[[concerns]]
id = "application_defaults"
path = "config/application-defaults.toml"

[[concerns]]
id = "runtime"
path = "config/runtime.toml"

[[concerns]]
id = "linear"
path = "config/integrations/linear.toml"
